<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:url('https://img.freepik.com/vector-gratis/linda-coleccion-dinosaurios-dibujados-mano_23-2148963341.jpg') center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    background:rgba(0,0,0,0.7);
    padding:30px;
    border-radius:20px;
    text-align:center;
    transition:0.5s;
}

h1{
    font-size:28px;
}

p{
    margin-top:10px;
    font-size:16px;
}

button{
    margin-top:20px;
    padding:12px 25px;
    font-size:16px;
    border:none;
    border-radius:10px;
    background:pink;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff69b4;
}

/* Imagen oculta */
#sorpresa{
    display:none;
    margin-top:20px;
    animation:fadeIn 1s ease;
}

#sorpresa img{
    width:250px;
    border-radius:15px;
}

/* Animación */
@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
    <h1>Thank you for being the love of my life ❤️</h1>
    <p>You make everything feel special... even the smallest moments 🦖✨</p>

    <button onclick="mostrar()">Click here</button>

    <div id="sorpresa">
        <img src="amorgatitorosa.jpg" alt="for you">
    </div>
</div>

<script>
function mostrar(){
    document.getElementById("sorpresa").style.display = "block";
}
</script>

</body>
</html>
